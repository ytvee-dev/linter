name: Publish npm package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Version increment for npm version
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Audit rules
        run: npm run audit:rules

      - name: Lint
        run: npx eslint . --config ./configs/fix.mjs --ext .js,.mjs,.ts,.tsx --report-unused-disable-directives --ignore-pattern docs/**

      - name: Check formatting
        run: node ./node_modules/prettier/bin/prettier.cjs --check package.json tsconfig.json eslint.config.mjs prettier.js .prettierrc.js .github/workflows/npm-publish.yml bin configs scripts

      - name: Build
        run: npm run build

      - name: Verify package surface
        run: npm pack --dry-run --json

      - name: Verify consumer exports
        run: npm run verify:consumer:exports

      - name: Verify npm audit
        run: npm audit --audit-level=moderate

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump version and create tag
        id: version
        shell: bash
        env:
          VERSION_INCREMENT: ${{ github.event.inputs.version || 'patch' }}
        run: |
          new_version="$(npm version "$VERSION_INCREMENT" -m "chore(release): v%s [skip ci]")"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.version }}"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
